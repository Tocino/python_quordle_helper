<!DOCTYPE html>
<html>
<head>
    <title>My Python Web App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Python Web Interface</h1>

    <form method="POST">
        <textarea name="user_text" placeholder="Enter text here"></textarea>
        <button type="submit">Submit</button>
    </form>

    {% if result %}
        <h2>Result:</h2>
        <p>{{ result }}</p>
    {% endif %}
</body>
</html>
